services:
    # ── Web Application ──────────────────────────────────────────────────────────
    - type: web
      name: facultyhub-web
      runtime: docker
      plan: free
      healthCheckPath: /up
      envVars:
          - key: APP_NAME
            value: FacultyHUB
          - key: APP_ENV
            value: production
          - key: APP_DEBUG
            value: "false"
          - key: APP_KEY
            generateValue: true
          - key: APP_URL
            value: https://facultyhub-e1pj.onrender.com

          # Database
          - key: DB_CONNECTION
            value: pgsql
          - key: DB_HOST
            fromDatabase:
                name: facultyhub-db
                property: host
          - key: DB_PORT
            fromDatabase:
                name: facultyhub-db
                property: port
          - key: DB_DATABASE
            fromDatabase:
                name: facultyhub-db
                property: database
          - key: DB_USERNAME
            fromDatabase:
                name: facultyhub-db
                property: user
          - key: DB_PASSWORD
            fromDatabase:
                name: facultyhub-db
                property: password

          # Session / Cache
          - key: SESSION_DRIVER
            value: database
          - key: SESSION_ENCRYPT
            value: "true"
          - key: CACHE_STORE
            value: database

          # Queue — sync: jobs run immediately in the same request (no worker needed)
          - key: QUEUE_CONNECTION
            value: sync

          # Storage — S3 / Cloudflare R2
          - key: FILESYSTEM_DISK
            value: s3
          - key: AWS_ACCESS_KEY_ID
            sync: false
          - key: AWS_SECRET_ACCESS_KEY
            sync: false
          - key: AWS_DEFAULT_REGION
            value: auto
          - key: AWS_BUCKET
            sync: false
          - key: AWS_ENDPOINT
            sync: false
          - key: AWS_USE_PATH_STYLE_ENDPOINT
            value: "true"
          - key: AWS_URL
            sync: false

          # AI — Google Gemini
          - key: GEMINI_API_KEY
            sync: false

          - key: MAIL_MAILER
            value: log
          - key: LOG_LEVEL
            value: error

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
    - name: facultyhub-db
      plan: free
      databaseName: facultyhub
      user: facultyhub
